# ==============================
# Trade Seeker — Config v4.0
# ==============================

symbols:
  mode: "tier_advisor"
  static_list: ["BTCUSDT","ETHUSDT","SOLUSDT"]
  tier_file: "/root/trade-seeker/out/tiers_SAB.txt"
  tiers: ["S","A","B","C","D"]

# Scanner performance
scanner:
  parallel_workers: 25   # concurrent kline fetches — tune down if VPS is tight on RAM

rules:
  enable:
    pump_spike:       true
    dump_spike:       true
    breakout_up:      true
    breakdown_down:   true
    ema_cross_up:     true
    ema_cross_down:   true
    pump_early:       true   # NEW
    breakout_up_early: true  # NEW

  ema_len:       20
  ema_fast_len:  9
  ema_slow_len:  20
  lookback_bars: 32
  cooldown_min:  20

  # CONFIRMED thresholds (unchanged from v3.4)
  pump_spike:
    delta_pct:    1.4
    vol_mult:     2.6
    min_notional: 80000

  dump_spike:
    delta_pct:    -1.4
    vol_mult:     2.6
    min_notional: 80000

  breakout_up:
    range_lookback: 32
    buffer_pct:     0.20
    vol_mult:       2.2
    ema_confirm:    true
    min_notional:   120000

  breakdown_down:
    range_lookback: 32
    buffer_pct:     0.20
    vol_mult:       2.2
    ema_confirm:    true
    min_notional:   120000

  ema_cross:
    vol_mult:       2.0
    min_notional:   100000

  # EARLY layer — fires intrabar before CONFIRMED thresholds
  early:
    delta_pct:      2.5    # % move from open (pump early trigger)
    vol_mult:       1.8    # looser than CONFIRMED
    min_notional:   50000  # lower bar to catch smaller caps early
    cooldown_min:   10     # shorter cooldown (CONFIRMED = 20 min)
    range_lookback: 32
    buffer_pct:     0.20
    ema_confirm:    true

timeframes:
  "15m":
    pump_adjust:  {delta_pct: 1.4, vol_mult: 2.6, min_notional: 80000}
    dump_adjust:  {delta_pct: -1.4, vol_mult: 2.6, min_notional: 80000}
    bo_up_adjust: {vol_mult: 2.2, min_notional: 120000}
    bo_dn_adjust: {vol_mult: 2.2, min_notional: 120000}
    cross_adjust: {vol_mult: 2.0, min_notional: 100000}

  "30m":
    pump_adjust:  {delta_pct: 2.2, vol_mult: 2.2, min_notional: 120000}
    dump_adjust:  {delta_pct: -2.2, vol_mult: 2.2, min_notional: 120000}
    bo_up_adjust: {vol_mult: 2.0, min_notional: 150000}
    bo_dn_adjust: {vol_mult: 2.0, min_notional: 150000}
    cross_adjust: {vol_mult: 1.8, min_notional: 150000}

  "1h":
    pump_adjust:  {delta_pct: 3.2, vol_mult: 2.0, min_notional: 150000}
    dump_adjust:  {delta_pct: -3.2, vol_mult: 2.0, min_notional: 150000}
    bo_up_adjust: {vol_mult: 1.8, min_notional: 200000}
    bo_dn_adjust: {vol_mult: 1.8, min_notional: 200000}
    cross_adjust: {vol_mult: 1.6, min_notional: 180000}

telegram:
  enable:       true
  prefix:       "TS"
  throttle_sec: 2

logging:
  level:     "INFO"
  to_file:   false
  file_path: "/root/trade-seeker/logs/bot.log"
