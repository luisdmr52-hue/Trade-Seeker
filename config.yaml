# ==============================
# Trade Seeker — Config v4.0
# ==============================

symbols:
  mode: "tier_advisor"
  static_list: ["BTCUSDT","ETHUSDT","SOLUSDT"]
  tier_file: "/root/trade-seeker/out/tiers_SAB.txt"
  tiers: ["S","A","B","C","D"]

# Scanner performance
scanner:
  parallel_workers: 25   # concurrent kline fetches — tune down if VPS is tight on RAM

rules:
  enable:
    pump_spike:       false
    dump_spike:       false
    breakout_up:      false
    breakdown_down:   false
    ema_cross_up:     false
    ema_cross_down:   false
    pump_early:       false  # NEW
    breakout_up_early: false  # NEW

  ema_len:       20
  ema_fast_len:  9
  ema_slow_len:  20
  lookback_bars: 32
  cooldown_min:  20

  # CONFIRMED thresholds (unchanged from v3.4)
  pump_spike:
    delta_pct:    1.4
    vol_mult:     2.6
    min_notional: 80000

  dump_spike:
    delta_pct:    -1.4
    vol_mult:     2.6
    min_notional: 80000

  breakout_up:
    range_lookback: 32
    buffer_pct:     0.20
    vol_mult:       2.2
    ema_confirm:    true
    min_notional:   120000

  breakdown_down:
    range_lookback: 32
    buffer_pct:     0.20
    vol_mult:       2.2
    ema_confirm:    true
    min_notional:   120000

  ema_cross:
    vol_mult:       2.0
    min_notional:   100000

  # Fast 15m loop — dedicated breakout detection every ~15s
  fast_loop:
    min_notional: 40000   # lower bar than main loop
    cooldown_min: 10      # separate cooldown from main loop

  # EARLY layer — fires intrabar before CONFIRMED thresholds
  early:
    delta_pct:      2.5    # % move from open (pump early trigger)
    vol_mult:       1.8    # looser than CONFIRMED
    min_notional:   50000  # lower bar to catch smaller caps early
    cooldown_min:   10     # shorter cooldown (CONFIRMED = 20 min)
    range_lookback: 32
    buffer_pct:     0.20
    ema_confirm:    true

  fast_ts:
    poll_interval_s:  2
    pump_pct:         0.30
    min_vol_24h:      200000
    cooldown_min:     5
    confirm_ratio:    0.55
    confirm_window_s: 30
    confirm_ttl_s:    90
    rel_volume_min:   3.0

timeframes:
  "15m":
    early_enabled: true          # EARLY fires on 15m
    late_filter_pct: ~           # no late filter on 15m (velas cortas)
    pump_adjust:  {delta_pct: 1.4, vol_mult: 2.6, min_notional: 80000}
    dump_adjust:  {delta_pct: -1.4, vol_mult: 2.6, min_notional: 80000}
    bo_up_adjust: {vol_mult: 2.2, min_notional: 120000}
    bo_dn_adjust: {vol_mult: 2.2, min_notional: 120000}
    cross_adjust: {vol_mult: 2.0, min_notional: 100000}

  "30m":
    early_enabled: true          # EARLY fires on 30m
    late_filter_pct: ~           # no late filter on 30m
    pump_adjust:  {delta_pct: 2.2, vol_mult: 2.2, min_notional: 120000}
    dump_adjust:  {delta_pct: -2.2, vol_mult: 2.2, min_notional: 120000}
    bo_up_adjust: {vol_mult: 2.0, min_notional: 150000}
    bo_dn_adjust: {vol_mult: 2.0, min_notional: 150000}
    cross_adjust: {vol_mult: 1.8, min_notional: 150000}

  "1h":
    early_enabled: false         # EARLY disabled on 1h — not meaningful
    late_filter_pct: 5.0         # silenciar si la vela ya subio/bajo >5%
    pump_adjust:  {delta_pct: 3.2, vol_mult: 2.0, min_notional: 150000}
    dump_adjust:  {delta_pct: -3.2, vol_mult: 2.0, min_notional: 150000}
    bo_up_adjust: {vol_mult: 1.8, min_notional: 200000}
    bo_dn_adjust: {vol_mult: 1.8, min_notional: 200000}
    cross_adjust: {vol_mult: 1.6, min_notional: 180000}

telegram:
  enable:       true
  prefix:       "TS"
  throttle_sec: 2

logging:
  level:     "INFO"
  to_file:   false
  file_path: "/root/trade-seeker/logs/bot.log"

coverage_universe:
  min_quote_vol_24h_usd: 200000
  min_trade_count_24h:   500
  rebuild_interval_h:    6
  extra_stable_pairs:
    - "USD1USDT"
    - "RLUSDUSDT"

benthos_runtime:
  compose_dir:      "/root/kts-lab/compose"
  base_yaml:        "config/benthos_spot_base.yaml"
  runtime_yaml:     "config/benthos_spot.yaml"
  metrics_url:      "http://localhost:4199/metrics"
  verify_timeout_s: 60

time_gates:
  aggressive_hours_utc: [14, 15, 16, 17]
  normal_hours_utc:     [8, 9, 10, 11, 12, 13]
  caution_hours_utc:    [18, 19]
  pause_hours_utc:      [20, 21, 22]
  operator_awake_start: 8
  operator_awake_end:   22
